<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher-Pay</title>

<link rel="stylesheet" href="style.css">

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<h1>📚 Teacher-Pay</h1>

</header>

<div class="container">

<div class="dashboard">

<div class="box">
<h2 id="teacherCount">0</h2>
<p>Teachers</p>
</div>

<div class="box">
<h2 id="totalDue">৳0</h2>
<p>Total Due</p>
</div>

</div>

<div class="card">

<h2>Add Teacher</h2>

<input
type="text"
id="name"
placeholder="Teacher Name">

<input
type="text"
id="subject"
placeholder="Subject">

<select id="paymentType">

<option value="class">
Per Class
</option>

<option value="monthly">
Monthly
</option>

</select>

<input
type="number"
id="fee"
placeholder="Fee">

<button onclick="addTeacher()">

Add Teacher

</button>

</div>

<div class="card">

<h2>Teacher List</h2>

<input
type="text"
id="search"
placeholder="Search Teacher..."
onkeyup="searchTeacher()">

<div id="teacherList">

</div>

</div>

<div class="card">

<button onclick="downloadPDF()">

Download PDF

</button>

<button onclick="clearAll()">

Delete All

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

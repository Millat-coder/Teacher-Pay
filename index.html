<!DOCTYPE html>
<html lang="en">
<head>

  <title>Teacher Pay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  Teacher Pay
</header>

<div class="container">
  <div class="card">

</div>

<script src="script.js"></script>

</body>
</html>

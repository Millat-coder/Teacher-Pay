<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Pay V3</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<div class="header">

<h1>📚 Teacher Pay</h1>

<p>Personal Teacher Manager V3</p>

</div>

</header>

<div class="container">

<!-- Dashboard -->

<div class="dashboard">

<div class="box">
<h2 id="teacherCount">0</h2>
<p>Total Teachers</p>
</div>

<div class="box">
<h2 id="paidCount">0</h2>
<p>Paid</p>
</div>

<div class="box">
<h2 id="dueCount">0</h2>
<p>Due</p>
</div>

<div class="box">
<h2 id="totalMoney">৳0</h2>
<p>Total Amount</p>
</div>

</div>

<!-- Add Teacher -->

<div class="card">

<h2>Add Teacher</h2>

<input
type="text"
id="name"
placeholder="Teacher Name">

<input
type="text"
id="subject"
placeholder="Subject">

<input
type="text"
id="phone"
placeholder="Phone Number">

<select id="paymentType">

<option value="Monthly">
Monthly
</option>

<option value="Per Class">
Per Class
</option>

</select>

<input
type="number"
id="fee"
placeholder="Fee">

<input
type="number"
id="paymentDate"
placeholder="Payment Date (1-31)">

<textarea
id="note"
rows="3"
placeholder="Note"></textarea>

<button onclick="addTeacher()">

➕ Add Teacher

</button>

</div>

<!-- Search -->

<div class="card">

<h2>Search</h2>

<input
type="text"
id="search"
placeholder="Search Teacher..."
onkeyup="searchTeacher()">

</div>

<!-- Teacher List -->

<div class="card">

<h2>Teacher List</h2>

<div id="teacherList">

</div>

</div>
<!-- Attendance -->

<div class="card">

<h2>Attendance</h2>

<p>এই ভার্সনে Attendance ফিচার পরবর্তী আপডেটে চালু হবে।</p>

</div>

<!-- Reports -->

<div class="card">

<h2>Reports</h2>

<button onclick="downloadPDF()">
📄 Download PDF
</button>

<button onclick="clearAll()">
🗑 Delete All Teachers
</button>

</div>

<!-- Edit Teacher Modal -->

<div id="editModal" class="modal" style="display:none;">

<div class="modal-content">

<h2>Edit Teacher</h2>

<input type="text" id="editName" placeholder="Teacher Name">

<input type="text" id="editSubject" placeholder="Subject">

<input type="text" id="editPhone" placeholder="Phone">

<select id="editPaymentType">

<option value="Monthly">Monthly</option>

<option value="Per Class">Per Class</option>

</select>

<input type="number" id="editFee" placeholder="Fee">

<input type="number" id="editPaymentDate" placeholder="Payment Date">

<textarea id="editNote" rows="3" placeholder="Note"></textarea>

<button onclick="saveEdit()">
💾 Save Changes
</button>

<button onclick="closeEdit()">
❌ Cancel
</button>

</div>

</div>

</div>

<footer>

<p>Teacher Pay V3 © 2026</p>

</footer>

<script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Pay</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Teacher Pay</h1>

<div id="authBox">

<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPassword" placeholder="Password">

<button id="loginBtn">Login</button>

<p>Don't have an account?</p>

<button id="showSignup">Create Account</button>

</div>


<div id="signupBox" style="display:none;">

<h2>Create Account</h2>

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<button id="signupBtn">Sign Up</button>

<button id="showLogin">Back To Login</button>

</div>


<div id="dashboard" style="display:none;">

<h2>Add Teacher</h2>

<input type="text" id="teacherName" placeholder="Teacher Name">

<input type="text" id="teacherSubject" placeholder="Subject">

<input type="number" id="teacherFee" placeholder="Per Class Fee">

<button id="addTeacherBtn">Add Teacher</button>

<hr>

<div id="teacherList"></div>

<br>

<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module" src="firebase.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Pay</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      margin:0;
      padding:20px;
    }
    .card{
      max-width:500px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,.1);
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button{
      background:#2563eb;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<div class="card">
<h2>Teacher Pay</h2>

<input id="name" placeholder="Teacher Name">

<input id="fee" type="number" placeholder="Per Class Fee">

<button onclick="addTeacher()">Add Teacher</button>

<div id="list"></div>

</div>

<script>
function addTeacher(){
let name=document.getElementById("name").value;
let fee=document.getElementById("fee").value;

if(name==""||fee==""){
alert("সব তথ্য দিন");
return;
}

document.getElementById("list").innerHTML +=
`<p><b>${name}</b> - ${fee} টাকা/ক্লাস</p>`;

document.getElementById("name").value="";
document.getElementById("fee").value="";
}
</script>

</body>
</html>
